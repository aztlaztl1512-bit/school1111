<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار التميز في القدرات - أ/ عبدالعزيز الفيفي</title>
    <style>
        :root { --primary: #2c3e50; --accent: #d4af37; --blue: #3498db; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .quiz-container { background: white; width: 100%; max-width: 700px; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); border-top: 10px solid var(--primary); position: relative; overflow: hidden; }
        .header-info { text-align: right; margin-bottom: 25px; padding: 15px; background: #fdfcf0; border-radius: 15px; border-right: 6px solid var(--accent); }
        .teacher-name { color: #b8860b; font-size: 1.3rem; font-weight: 900; margin-bottom: 5px; }
        .school-info { color: var(--blue); font-size: 1.1rem; font-weight: bold; }
        .timer-circle { width: 55px; height: 55px; border-radius: 50%; border: 4px solid var(--blue); display: flex; align-items: center; justify-content: center; font-weight: bold; position: absolute; left: 30px; top: 30px; color: var(--blue); background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #ddd; border-radius: 12px; font-size: 1.1rem; text-align: center; outline: none; transition: 0.3s; box-sizing: border-box; }
        button { background: var(--blue); color: white; border: none; padding: 16px 25px; border-radius: 12px; cursor: pointer; font-size: 1.2rem; width: 100%; font-weight: bold; transition: 0.3s; box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3); }
        button:hover { background: #2980b9; transform: translateY(-2px); }
        .question-text { font-size: 1.5rem; margin: 45px 0 25px; font-weight: bold; color: var(--primary); text-align: center; line-height: 1.5; background: #f9f9f9; padding: 20px; border-radius: 15px; }
        .option { border: 2px solid #eee; padding: 15px; margin: 10px 0; border-radius: 15px; cursor: pointer; transition: 0.2s; text-align: right; font-size: 1.1rem; background: #fff; position: relative; }
        .option:hover { border-color: var(--blue); background: #f0faff; transform: scale(1.01); }
        .hint-text { font-size: 0.9rem; color: #7f8c8d; margin-top: 10px; font-style: italic; text-align: right; display: none; }
        .final-signature { margin-top: 35px; padding: 25px; background: #f8fbff; border-radius: 18px; text-align: center; border: 1px dashed var(--blue); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="start-screen">
        <div class="header-info">
            <div class="teacher-name">👨‍🏫 أ / عبدالعزيز الفيفي</div>
            <div class="school-info">🏫 ثانوية الأمير عبدالمجيد</div>
        </div>
        <h2 style="color: var(--primary); text-align: center;">📝 تجميعات لفظي (2026/04/07)</h2>
        <p style="text-align: center; color: #666;">مستعد للتحدي؟ لديك <strong>60 ثانية</strong> لكل سؤال ⏱️</p>
        <input type="text" id="student-name" placeholder="أدخل اسمك الثلاثي هنا للمتابعة ✏️">
        <button onclick="startQuiz()">ابدأ الاختبار التفاعلي 🚀</button>
    </div>

    <div id="game-screen" class="hidden">
        <div class="timer-circle" id="timer">60</div>
        <div id="question-info" style="color: #7f8c8d; text-align: center; margin-top: 10px; font-weight: bold;"></div>
        <div class="question-text" id="question"></div>
        <div id="options"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h2 id="congrats-msg" style="color: var(--success); text-align: center;">🎊 انتهى الاختبار</h2>
        <div style="font-size: 3.5rem; color: var(--blue); margin: 15px 0; font-weight: 900; text-align: center;" id="final-score"></div>
        <div class="final-signature">
            <div class="teacher-name">أ / عبدالعزيز الفيفي</div>
            <div class="school-info">ثانوية الأمير عبدالمجيد</div>
        </div>
    </div>
</div>

<script>
    const questions = [
        { q: "انتصار : عراك", opts: ["أ) تعاون : تكاتف", "ب) حوار : إقناع", "ج) تربية : تنشئة", "د) شراء : تفاوض"], c: 1, h: "العراك يؤدي للانتصار والحوار يؤدي للإقناع." },
        { q: "صالح : طالح", opts: ["أ) فظاظة : لين", "ب) حشرة : نحلة", "ج) سيارة : محرك", "د) محبة : كره"], c: 0, h: "علاقة تضاد." },
        { q: "جحر : عرين", opts: ["أ) إسطبل : حظيرة", "ب) جبل : قمة", "ج) نهر : شاطئ", "د) بيت : أثاث"], c: 0, h: "كلاهما من مساكن الحيوانات." },
        { q: "كتاب : قراءة", opts: ["أ) فواكه : أكل", "ب) قلم : تعبير", "ج) طائرة : إقلاع", "د) كتاب : دفاتر"], c: 0, h: "الكتاب للقراءة والفاكهة للأكل." },
        { q: "بناء : رخصة", opts: ["أ) جراحة : تخدير", "ب) هدم : عمارة", "ج) جواز : سفر", "د) دراسة : شهادة"], c: 0, h: "البناء يتطلب رخصة والجراحة تتطلب تخدير." },
        { q: "طبيب : ممرض", opts: ["أ) مدير : معلم", "ب) مهندس : عامل", "ج) طالب : كتاب", "د) دفتر : كتاب"], c: 0, h: "علاقة توجيه ورتبة." },
        { q: "مقتصد : مسرف", opts: ["أ) شهم : وغد", "ب) منتهز : مفرط", "ج) ليل : نوم", "د) نهار : عمل"], c: 1, h: "علاقة تضاد." },
        { q: "معجم : موسوعة", opts: ["أ) قارة : دولة", "ب) مدرسة : جامعة", "ج) عالم : باحث", "د) علوم : فيزياء"], c: 1, h: "علاقة تدرج أو فئة واحدة." },
        { q: "الفم : طعام", opts: ["أ) النخلة : ساق", "ب) جذع : شجرة", "ج) البحر : سمك", "د) دماغ : رأس"], c: 2, h: "الطعام في الفم والسمك في البحر." },
        { q: "عجبي لرجال أجسامهم ........ وعقولهم ........", opts: ["أ) تضعف - تهزل", "ب) تنمو - تنضج", "ج) تنمو - تصغر", "د) تكبر - تنمو"], c: 2, h: "سياق يدل على التناقض." },
        { q: "عدو الرجل ........ وصديقه ........", opts: ["أ) حمقه - عقله", "ب) قلبه - ماله", "ج) ماله - قلبه", "د) صمته - كلامه"], c: 0, h: "الحمق يضر كعدو والعقل ينفع كصديق." },
        { q: "المعلم ........ ينسجم الطلاب معه.", opts: ["أ) الحكيم - يتململون", "ب) الفصيح - ينسجمون", "ج) البليغ - يتشاجرون", "د) الضعيف - يختلطون"], c: 1, h: "المعلم الفصيح يجذب الطلاب." },
        { q: "قل عن نفسك ما ........ يقول الناس عنك ما ........", opts: ["أ) تحب - تكره", "ب) تعرف - تجهل", "ج) تريد - يغضب", "د) تشاهد - يسمعون"], c: 0, h: "سياق إكمال الجملة." },
        { q: "اتبع ........ العدو فهي ترشدك إليهم.", opts: ["أ) سهام", "ب) أخبار", "ج) أفكار", "د) خطط"], c: 0, h: "السهام تدل على المصدر." },
        { q: "الراحة كالسراب كلما اقتربت منها (اقتربت) ولا نصل إليها إلا في الآخرة.", opts: ["أ) الراحة", "ب) اقتربت الأولى", "ج) اقتربت الثانية", "د) الآخرة"], c: 2, h: "الخطأ السياقي (اقتربت الثانية) والصواب (ابتعدت)." },
        { q: "السلامة خير من الندامة والأسى خير من التكلف والقناعة خير من الضراعة.", opts: ["أ) السلامة", "ب) الأسى", "ج) التكلف", "د) القناعة"], c: 1, h: "الخطأ السياقي هو الأسى." },
        { q: "الحق والباطل متناقضان لا يجتمعان وبينهما (تماثل) كبير.", opts: ["أ) الباطل", "ب) متناقضان", "ج) تماثل", "د) كبير"], c: 2, h: "المتناقضان لا يتماثلان." },
        { q: "أن (تسيء) إلى من أساء إليك وتعطي من حرمك سيعلم الناس كرم أخلاقك.", opts: ["أ) تسيء", "ب) إليك", "ج) كرم", "د) أخلاقك"], c: 0, h: "الصواب (تحسن)." },
        { q: "من أفضل وسائل التعليم القراءة، وهي قراءة الكلمات المكتوبة بغرض (حفظها).", opts: ["أ) وسائل", "ب) القراءة", "ج) الكلمات", "د) حفظها"], c: 3, h: "الصواب (فهمها)." },
        { q: "يظن الصغير أن السعادة في (البذل) ثم يكبر ويكتشف أن السعادة في العطاء.", opts: ["أ) الصغير", "ب) البذل", "ج) يكبر", "د) السعادة"], c: 1, h: "الصواب (الأخذ)." },
        { q: "مشاهدة التلفاز أثناء تناول الطعام يزيد تناوله ويزيد من (تفاعل) الطفل مع أسرته.", opts: ["أ) أثناء", "ب) الطعام", "ج) تفاعل", "د) أسرته"], c: 2, h: "الصواب (عزلة)." },
        { q: "لا تدخر ما تبقى بعد (الاقتصاد)، بل أنفق ما تبقى بعد الادخار.", opts: ["أ) تدخر", "ب) الاقتصاد", "ج) أنفق", "د) الادخار"], c: 1, h: "خطأ سياقي." },
        { q: "اختر المفردة الشاذة:", opts: ["أ) العمرة", "ب) الصلاة", "ج) الزكاة", "د) الدعاء"], c: 3, h: "الدعاء ليس ركناً مفروضاً كالبقية." },
        { q: "اختر المفردة الشاذة:", opts: ["أ) الاضطباع", "ب) التلفع", "ج) السدل", "د) الاضطجاع"], c: 3, h: "الاضطجاع وضعية نوم والبقية وضعيات لباس." },
        { q: "نسبة إصابة البالغين إلى الأطفال وفقاً للفقرة (3):", opts: ["أ) 2:4", "ب) 2:6", "ج) 2:5", "د) 2:8"], c: 2, h: "حسب إحصائيات القطعة." },
        { q: "كم تمثل نسبة الإصابة بالإنفلونزا لدى البالغين؟", opts: ["أ) 4%", "ب) 5%", "ج) 6%", "د) 10%"], c: 3, h: "مذكورة في الفقرة 3." },
        { q: "الدول التي لا يمكنها تغيير اللقاح باستمرار هي:", opts: ["أ) الدول المتطورة", "ب) الدول الفقيرة", "ج) الدول المتقدمة", "د) دول العالم الأول"], c: 1, h: "الدول النامية/الفقيرة." },
        { q: "تقلب الجو مع مخالطة المصابين يؤدي إلى:", opts: ["أ) الإصابة بالسعال", "ب) ارتفاع الحرارة", "ج) انتعاش الفيروس", "د) الإصابة بالإنفلونزا"], c: 3, h: "النتيجة المباشرة للمخالطة." },
        { q: "مخالطة المصاب للمجموعة غير المصابة يؤدي لـ:", opts: ["أ) حضانة الفيروس", "ب) انتقال الفيروس", "ج) إضعاف الفيروس", "د) اكتشاف الفيروس"], c: 1, h: "انتقال العدوى." },
        { q: "الفقرة الثانية بالنسبة للفقرة الأولى:", opts: ["أ) ترسيخ لما ورد فيها", "ب) تأكيد لما ورد فيها", "ج) تحليل لمحتواها", "د) نتيجة لها"], c: 1, h: "علاقة تأكيد." }
    ];

    let current = 0, score = 0, name = "", userAnswers = [], timeLeft = 30, timerInterval;

    function startQuiz() {
        name = document.getElementById('student-name').value;
        if(name.trim().length < 4) return alert("فضلاً أدخل اسمك الثلاثي ✨");
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        clearInterval(timerInterval);
        timeLeft = 30;
        document.getElementById('timer').innerText = timeLeft;
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) next(-1);
        }, 1000);

        const q = questions[current];
        document.getElementById('question-info').innerText = `السؤال ${current + 1} من ${questions.length}`;
        document.getElementById('question').innerText = q.q;
        const container = document.getElementById('options');
        container.innerHTML = '';
        q.opts.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = opt;
            div.onclick = () => next(i);
            container.appendChild(div);
        });
    }

    function next(idx) {
        userAnswers.push(idx);
        if(idx === questions[current].c) score++;
        current++;
        if(current < questions.length) showQuestion(); else showResults();
    }

    function showResults() {
        clearInterval(timerInterval);
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = `درجتك: ${score} من ${questions.length}`;
        alert("انتهى الاختبار بنجاح! ✨ أ / عبد العزيز الفيفي - ثانوية الأمير عبدالمجيد 🎓");
    }
</script>
</body>
</html>
